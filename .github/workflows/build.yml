name: Build Plugin
on:
  push:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x64'

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/vcpkg
            vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'CMakePresets.json') }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'CMakePresets.json') }}-
            cmake-build-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgJsonGlob: vcpkg.json
        env:
          VCPKG_BINARY_SOURCES: 'clear;files,~/AppData/Local/vcpkg,readwrite'

      - name: Build (First Attempt)
        id: build_first
        uses: lukka/run-cmake@v10
        continue-on-error: true
        with:
          configurePreset: config-release
          buildPreset: build-release

      - name: Clean and reconfigure on failure
        if: steps.build_first.outcome == 'failure'
        run: |
          Write-Host "First build attempt failed. Cleaning and reconfiguring..."
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          cmake --preset config-release --fresh
        shell: pwsh

      - name: Build (Retry After Clean)
        if: steps.build_first.outcome == 'failure'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: config-release
          buildPreset: build-release

      - name: Upload Distribution Package (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: distribution-package
          path: distribution/Package-*

      - name: Detect version change in CMakeLists.txt
        id: ver
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          function Extract-Version([string]$text) {
            if ($text -match 'VERSION\s+(\d+\.\d+\.\d+\.\d+)') { return $Matches[1] }
            return $null
          }

          $newText = Get-Content -Raw CMakeLists.txt
          $newVer = Extract-Version $newText
          if (-not $newVer) { throw "Could not extract version (expected VERSION X.Y.Z.W)." }

          $oldVer = ""
          if ($env:GITHUB_EVENT_BEFORE -and $env:GITHUB_EVENT_BEFORE -ne "0000000000000000000000000000000000000000") {
            try {
              $oldText = git show "$env:GITHUB_EVENT_BEFORE`:CMakeLists.txt" 2>$null
              $oldVer = Extract-Version $oldText
            } catch {}
          }

          "new_version=$newVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($newVer -ne $oldVer) { "changed=true" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8 }
          else { "changed=false" | Out-File $env:GITHUB_OUTPUT -Append -Encoding utf8 }
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}

      - name: Create/Update GitHub Release (no explicit tag step)
        if: github.event_name == 'push' && steps.ver.outputs.changed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.ver.outputs.new_version }}"

          $files = Get-ChildItem -Path "dist\Package-*" -ErrorAction SilentlyContinue
          if (-not $files) {
            $files = Get-ChildItem -Path "dist\Package-*" -ErrorAction SilentlyContinue
          }

          if (-not $files) { $files = Get-ChildItem -Path "distribution\Package-*" -ErrorAction SilentlyContinue }

          if (-not $files) { throw "No Package-* found to upload." }

          $paths = $files | ForEach-Object { $_.FullName }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $paths --clobber
          } else {
            gh release create $tag $paths --title $tag --generate-notes
          }
