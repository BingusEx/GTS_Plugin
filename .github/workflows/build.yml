name: Build Plugin
on:
  push:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'cmake/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'vcpkg.json'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: 'x64'

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/vcpkg
            vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'CMakePresets.json') }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            cmake-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'cmake/**', 'CMakePresets.json') }}-
            cmake-build-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11.5
        with:
          vcpkgJsonGlob: vcpkg.json
        env:
          VCPKG_BINARY_SOURCES: 'clear;files,~/AppData/Local/vcpkg,readwrite'

      - name: Build (First Attempt)
        id: build_first
        uses: lukka/run-cmake@v10
        continue-on-error: true
        with:
          configurePreset: config-release
          buildPreset: build-release

      - name: Clean and reconfigure on failure
        if: steps.build_first.outcome == 'failure'
        run: |
          Write-Host "First build attempt failed. Cleaning and reconfiguring..."
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          cmake --preset config-release --fresh
        shell: pwsh

      - name: Build (Retry After Clean)
        if: steps.build_first.outcome == 'failure'
        uses: lukka/run-cmake@v10
        with:
          configurePreset: config-release
          buildPreset: build-release

      - name: Upload Distribution Package
        uses: actions/upload-artifact@v4
        with:
          name: distribution-package
          path: distribution/Package-*

  release:
    name: Create GitHub Release if CMake version changed
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout (full history for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change in CMakeLists.txt
        id: ver
        shell: bash
        run: |
          set -euo pipefail

          extract_version () {
            grep -oE 'VERSION[[:space:]]+[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' "$1" \
              | head -n1 | awk '{print $2}'
          }

          new_ver="$(extract_version CMakeLists.txt || true)"
          if [[ -z "${new_ver}" ]]; then
            echo "Could not extract 4-part version from CMakeLists.txt (expected 'VERSION X.Y.Z.W')."
            exit 1
          fi

          before="${{ github.event.before }}"
          old_ver=""
          if [[ "$before" != "0000000000000000000000000000000000000000" ]]; then
            if git show "$before:CMakeLists.txt" > /tmp/CMakeLists.txt.before 2>/dev/null; then
              old_ver="$(extract_version /tmp/CMakeLists.txt.before || true)"
            fi
          fi

          echo "old_version=${old_ver}" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_ver}" >> "$GITHUB_OUTPUT"

          if [[ "${new_ver}" != "${old_ver}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if version did not change
        if: steps.ver.outputs.changed != 'true'
        run: echo "Version unchanged; skipping release."

      - name: Download build artifact
        if: steps.ver.outputs.changed == 'true'
        uses: actions/download-artifact@v4
        with:
          name: distribution-package
          path: dist

      - name: Create tag (if missing)
        if: steps.ver.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.new_version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists."
            exit 0
          fi
          git tag "$tag"
          git push origin "$tag"

      - name: Upload built distribution zips to the release
        if: steps.ver.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="v${{ steps.ver.outputs.new_version }}"

          shopt -s nullglob
          files=(dist/[dD]istribution-*)
          if (( ${#files[@]} == 0 )); then
            echo "No dist/distribution-* files found. Contents of dist/:"
            ls -la dist || true
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" "${files[@]}" --title "$tag" --generate-notes
          fi
